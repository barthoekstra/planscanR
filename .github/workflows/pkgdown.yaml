# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2
        # tools/pkgdown-alerts.R appends `+alerts` to pandoc's `markdown`
        # reader. The alerts extension shipped in pandoc 3.2 but only for
        # the `gfm`/`commonmark_x` readers; it wasn't extended to the
        # `markdown` reader until pandoc 3.9.
        with:
          pandoc-version: "3.9"

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        # tools/pkgdown-alerts.R monkey-patches pkgdown so `> [!WARNING]`
        # blockquotes render as Bootstrap callouts (paired with
        # pkgdown/extra.scss). new_process = FALSE keeps the patches
        # alive — a callr subprocess would not inherit them.
        run: |
          source("tools/pkgdown-alerts.R")
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
